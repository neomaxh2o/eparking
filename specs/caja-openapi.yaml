openapi: 3.0.3
info:
  title: eParking - Caja & Turnos API
  version: '1.0'
servers:
  - url: http://localhost:3010/api
paths:
  /shifts/open:
    post:
      summary: Open a new shift
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenShiftRequest'
      responses:
        '201':
          description: Shift created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
        '409':
          description: Conflict
  /shifts:
    get:
      summary: List shifts
      parameters:
        - in: query
          name: storeId
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [open, closed, suspended]
      responses:
        '200':
          description: list of shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shift'
  /shifts/{id}:
    get:
      summary: Get shift
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: shift object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
  /shifts/{id}/close:
    post:
      summary: Close a shift
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseShiftRequest'
      responses:
        '200':
          description: closed shift
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shift'
  /tickets:
    post:
      summary: Create ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '201':
          description: ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
  /tickets/{id}:
    get:
      summary: Get ticket
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
  /cash-movements:
    post:
      summary: Create cash movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCashMovement'
      responses:
        '201':
          description: cash movement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashMovement'
  /reports/shift/{id}:
    get:
      summary: Shift report
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: report
          content:
            application/json:
              schema:
                type: object
                properties:
                  shift:
                    $ref: '#/components/schemas/Shift'
                  tickets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ticket'
                  cashMovements:
                    type: array
                    items:
                      $ref: '#/components/schemas/CashMovement'
                  summary:
                    type: object
                    properties:
                      ticketsTotal:
                        type: integer
                      cashMovementsTotal:
                        type: integer
                      expectedCash:
                        type: integer
                      actualCash:
                        type: integer
                      difference:
                        type: integer
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
  schemas:
    OpenShiftRequest:
      type: object
      required: [storeId, startingCash]
      properties:
        storeId:
          type: string
        startingCash:
          type: integer
        notes:
          type: string
    CloseShiftRequest:
      type: object
      required: [actualCash]
      properties:
        actualCash:
          type: integer
        notes:
          type: string
    CreateTicketRequest:
      type: object
      required: [shiftId, storeId, items, paymentMethod]
      properties:
        shiftId:
          type: string
        storeId:
          type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, name, qty, unitPrice]
            properties:
              sku: { type: string }
              name: { type: string }
              qty: { type: number }
              unitPrice: { type: integer }
        paymentMethod: { type: string }
        payments:
          type: array
          items:
            type: object
            required: [method, amount]
            properties:
              method: { type: string }
              amount: { type: integer }
              reference: { type: string }
        notes: { type: string }
    CreateCashMovement:
      type: object
      required: [storeId, type, amount]
      properties:
        shiftId: { type: string }
        storeId: { type: string }
        type: { type: string }
        amount: { type: integer }
        reason: { type: string }
        reference: { type: string }
    Shift:
      type: object
      properties:
        _id: { type: string }
        storeId: { type: string }
        openedBy: { type: string }
        openedAt: { type: string }
        closedBy: { type: string, nullable: true }
        closedAt: { type: string, nullable: true }
        status: { type: string }
        startingCash: { type: integer }
        expectedCash: { type: integer }
        actualCash: { type: integer }
        ticketsCount: { type: integer }
        ticketsTotal: { type: integer }
        cashMovementsTotal: { type: integer }
        notes: { type: string }
    Ticket:
      type: object
      properties:
        _id: { type: string }
        shiftId: { type: string }
        storeId: { type: string }
        createdBy: { type: string }
        createdAt: { type: string }
        status: { type: string }
        total: { type: integer }
        items: { type: array }
        paymentMethod: { type: string }
        payments: { type: array }
        notes: { type: string }
    CashMovement:
      type: object
      properties:
        _id: { type: string }
        shiftId: { type: string }
        storeId: { type: string }
        createdBy: { type: string }
        createdAt: { type: string }
        type: { type: string }
        amount: { type: integer }
        direction: { type: string }
        reason: { type: string }
        reference: { type: string }
